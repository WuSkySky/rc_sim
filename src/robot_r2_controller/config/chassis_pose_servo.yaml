chassis_pose_servo:
  ros__parameters:
    current_pose_topic: /r2/pose_feedback
    cmd_vel_topic: /r2/cmd_vel
    move_to_pose_service: /r2/move_to_pose

    publish_rate: 50.0
    position_tolerance: 0.005
    yaw_tolerance: 0.01
    yaw_stable_cycles: 10
    completion_wait_sec: 0.3
    default_timeout_sec: 20.0

    x_kp: 1.0
    x_ki: 0.0
    x_kd: 0.03
    x_integral_limit: 0.3
    x_output_limit: 0.5

    y_kp: 1.0
    y_ki: 0.0
    y_kd: 0.03
    y_integral_limit: 0.3
    y_output_limit: 0.5

    yaw_kp: 0.3
    yaw_ki: 0.0
    yaw_kd: 0.02
    yaw_integral_limit: 10.0
    yaw_output_limit: 1.0
    yaw_small_error_gain_multiplier: 11.0
