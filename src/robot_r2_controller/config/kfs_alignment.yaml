kfs_alignment:
  ros__parameters:
    detection_topic: /r2/detection/processed
    cmd_vel_topic: /r2/cmd_vel
    align_service: /r2/align_to_kfs
    pixel_tolerance: 20
    default_timeout_sec: 10.0
    control_rate: 50.0

    # PID for lateral (linear.y) alignment
    kp: 0.008
    ki: 0.0003
    kd: 0.001
    integral_limit: 0.5
    output_limit: 1.0
