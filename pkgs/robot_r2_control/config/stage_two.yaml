stage_two_control:
  ros__parameters:
    service_name: /r2/stage_two
    move_to_pose_service: /r2/move_to_pose
    set_lift_service: /r2/lift/set
    load_kfs_service: /r2/kfs/load
    dependency_timeout_sec: 2.0
    move_wait_timeout_sec: 35.0
    lift_wait_timeout_sec: 15.0
    load_wait_timeout_sec: 70.0
    align_placeholder_wait_sec: 0.5

    # Row-major map. A cell is empty when x, y and height are all .nan.
    map_rows: 6
    map_columns: 5
    map_x: [.nan, -2.6, .nan, -2.6, .nan, -1.4, -1.4, -1.4, -1.4, -1.4, .nan, -0.2, -0.2, -0.2, .nan, 1.0, 1.0, 1.0, 1.0, .nan, .nan, 2.2, 2.2, 2.2, .nan, .nan, .nan, 3.4, .nan, .nan]
    map_y: [.nan, -4.2, .nan, -1.8, .nan, -5.4, -4.2, -3.0, -1.8, -0.6, .nan, -4.2, -3.0, -1.8, .nan, -5.4, -4.2, -3.0, -1.8, .nan, .nan, -4.2, -3.0, -1.8, .nan, .nan, .nan, -3.0, .nan, .nan]
    map_heights: [.nan, 0.0, .nan, 0.0, .nan, 0.0, 1.0, 2.0, 1.0, 0.0, .nan, 2.0, 3.0, 2.0, .nan, 0.0, 1.0, 2.0, 3.0, .nan, .nan, 2.0, 1.0, 2.0, .nan, .nan, .nan, 0.0, .nan, .nan]
    near_edge_offset: 0.3
    kfs_align_edge_offset: 0.72
    kfs_pickup_edge_offset: 0.55
    target_far_edge_offset: 0.487
    source_far_edge_offset: 0.487
    down_lower_edge_offset: 0.2

    lift_up_front: 0.2
    lift_up_rear: 0.2
    lift_at_near_edge_front: 0.0
    lift_at_near_edge_rear: 0.2
    lift_front_up_front: 0.2
    lift_front_up_rear: 0.0
    lift_final_front: 0.0
    lift_final_rear: 0.0
